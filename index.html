<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#16222E">
<title>TECHNICAL PRIZE TRAINING</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    min-height:100vh;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:22px;
    background:linear-gradient(160deg,#16222E 0%,#22303F 55%,#2C4257 100%);
    font-family:sans-serif;color:#fff;padding:24px;text-align:center;
  }
  .bib{
    display:inline-flex;align-items:center;gap:8px;background:#fff;color:#22303F;
    border-radius:6px;padding:4px 12px;font-weight:800;font-size:13px;letter-spacing:.1em;
  }
  .bib .dot{width:9px;height:9px;border-radius:50%;background:#D93A2B;}
  h1{font-size:26px;letter-spacing:.06em;line-height:1.25;font-weight:900;}
  h1 span{color:#8FB4D9;}
  .start{
    display:block;width:100%;max-width:340px;
    background:linear-gradient(135deg,#D93A2B,#B02718);
    color:#fff;text-decoration:none;font-weight:900;font-size:20px;
    letter-spacing:.12em;padding:20px;border-radius:14px;
    box-shadow:0 6px 20px rgba(0,0,0,.4);
  }
  .start:active{transform:scale(.97);}
  .s{font-size:12px;color:#9FB2C4;line-height:1.7;}
</style>
</head>
<body>
  <div class="bib"><span class="dot"></span>SAJ 1級 → TECHNICAL <span style="opacity:.6;">v4.0</span></div>
  <h1>TECHNICAL PRIZE<br><span>TRAINING LOG</span></h1>
  <a class="start" href="https://claude.ai/public/artifacts/026a294b-fa26-4c05-8b7e-585a359a1aa5">▶ START</a>
  <div class="s">スタートゲートをタップしてアプリを起動<br>雪山が待ってるぞ、兄弟</div>
</body>
</html>
